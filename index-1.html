<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="КПП">
  <link rel="manifest" href="manifest.json">
  <title>Каратэ: подготовка</title>
  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --border:    #2a2a30;
      --muted:     #4a4a55;
      --text:      #e8e8ec;
      --sub:       #8888a0;
      --accent:    #c8a84b;   /* warm amber — belt gold */
      --accent-d:  #9a7e35;
      --strength:  #c84b4b;   /* red */
      --flex:      #4b8ec8;   /* steel blue */
      --endur:     #4bc87a;   /* green */
      --rest:      #4a4a55;

      --r:         8px;
      --r-lg:      16px;

      --ff-display: 'Georgia', 'Times New Roman', serif;
      --ff-body:    system-ui, -apple-system, sans-serif;
      --ff-data:    'Courier New', monospace;
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      min-height: 100dvh;
      overscroll-behavior: none;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ─── LAYOUT ─────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; min-height: 100dvh; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ─── HEADER ─────────────────────────────────────────── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-back:not([data-visible]) { visibility: hidden; }
    .header-title {
      flex: 1;
      font-family: var(--ff-display);
      font-size: 17px;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .header-subtitle { font-size: 11px; color: var(--sub); font-family: var(--ff-body); letter-spacing: 0.04em; text-transform: uppercase; }

    /* ─── HOME SCREEN ────────────────────────────────────── */
    .home-hero {
      padding: 28px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hero-eyebrow {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--ff-data);
    }
    .hero-title {
      font-family: var(--ff-display);
      font-size: 28px;
      line-height: 1.15;
      color: var(--text);
    }
    .hero-title em {
      font-style: normal;
      color: var(--accent);
    }
    .hero-meta {
      font-size: 13px;
      color: var(--sub);
      margin-top: 4px;
    }

    /* progress ring */
    .week-ring-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin: 0 20px 20px;
    }
    .ring-svg { flex-shrink: 0; }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
    .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 5;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 40px 40px;
      transition: stroke-dashoffset 0.6s ease;
    }
    .ring-center {
      font-family: var(--ff-display);
      font-size: 18px;
      fill: var(--text);
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .ring-center-sub {
      font-size: 10px;
      fill: var(--sub);
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .ring-info { flex: 1; }
    .ring-week {
      font-family: var(--ff-display);
      font-size: 20px;
      color: var(--text);
      line-height: 1.2;
    }
    .ring-theme {
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .ring-days-done { font-size: 13px; color: var(--sub); }

    /* days grid */
    .section-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 20px;
      margin-bottom: 10px;
    }
    .days-grid {
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 24px;
    }
    .day-pill {
      aspect-ratio: 1;
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: 1.5px solid transparent;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .day-pill-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-pill-num { font-family: var(--ff-data); font-size: 13px; font-weight: bold; }

    .day-pill[data-type="strength"] { background: rgba(200,75,75,.15); border-color: rgba(200,75,75,.3); }
    .day-pill[data-type="flexibility"] { background: rgba(75,142,200,.15); border-color: rgba(75,142,200,.3); }
    .day-pill[data-type="endurance"] { background: rgba(75,200,122,.15); border-color: rgba(75,200,122,.3); }
    .day-pill[data-type="rest"] { background: rgba(74,74,85,.15); border-color: rgba(74,74,85,.2); }

    .day-pill[data-type="strength"] .day-pill-label { color: var(--strength); }
    .day-pill[data-type="flexibility"] .day-pill-label { color: var(--flex); }
    .day-pill[data-type="endurance"] .day-pill-label { color: var(--endur); }
    .day-pill[data-type="rest"] .day-pill-label { color: var(--muted); }
    .day-pill[data-type="strength"] .day-pill-num { color: var(--strength); }
    .day-pill[data-type="flexibility"] .day-pill-num { color: var(--flex); }
    .day-pill[data-type="endurance"] .day-pill-num { color: var(--endur); }
    .day-pill[data-type="rest"] .day-pill-num { color: var(--muted); }

    .day-pill.done::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(200,168,75,.12);
    }
    .day-pill.done .day-pill-num::after {
      content: '✓';
      position: absolute;
      top: -3px; right: -5px;
      font-size: 8px;
      color: var(--accent);
    }
    .day-pill.done .day-pill-num { position: relative; }
    .day-pill.current {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 1px var(--accent);
    }
    .day-pill[data-type="rest"]:not(.done):not(.current) { cursor: default; }
    .day-pill:not([data-type="rest"]) { cursor: pointer; }
    .day-pill:active:not([data-type="rest"]) { transform: scale(0.94); }

    /* weeks nav */
    .weeks-nav {
      padding: 0 20px 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .weeks-nav::-webkit-scrollbar { display: none; }
    .week-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      border: 1.5px solid var(--border);
      color: var(--sub);
      background: var(--surface);
      transition: all 0.15s;
      cursor: pointer;
    }
    .week-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,168,75,.08);
    }

    /* ─── WORKOUT SCREEN ─────────────────────────────────── */
    .workout-header-meta {
      display: flex; gap: 8px; align-items: center;
    }
    .type-badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--ff-data);
    }
    .type-badge.strength { background: rgba(200,75,75,.2); color: var(--strength); }
    .type-badge.flexibility { background: rgba(75,142,200,.2); color: var(--flex); }
    .type-badge.endurance { background: rgba(75,200,122,.2); color: var(--endur); }

    .exercise-list {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }
    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .ex-card:active { background: #1e1e24; }
    .ex-card.completed { border-color: var(--accent-d); }
    .ex-card.completed .ex-name { color: var(--sub); }

    .ex-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .ex-card.completed .ex-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ex-check-mark { display: none; font-size: 12px; color: var(--bg); }
    .ex-card.completed .ex-check-mark { display: block; }

    .ex-content { flex: 1; min-width: 0; }
    .ex-name {
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .ex-params {
      font-family: var(--ff-data);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .ex-note { font-size: 12px; color: var(--muted); font-style: italic; }
    .ex-tip {
      font-size: 12px;
      color: var(--sub);
      margin-top: 6px;
      line-height: 1.4;
      padding: 8px 10px;
      background: rgba(200,168,75,.05);
      border-left: 2px solid var(--accent-d);
      border-radius: 4px;
      display: none;
    }
    .ex-card.expanded .ex-tip { display: block; }

    /* workout progress bar */
    .workout-progress {
      height: 3px;
      background: var(--border);
      position: relative;
    }
    .workout-progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    /* complete button */
    .workout-footer {
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .btn-complete {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--bg);
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-complete:disabled { opacity: 0.35; cursor: default; }
    .btn-complete:not(:disabled):active { background: var(--accent-d); }

    /* ─── TIMER OVERLAY ──────────────────────────────────── */
    .timer-overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,15,.97);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 24px;
    }
    .timer-overlay.open { display: flex; }

    .timer-ex-name {
      font-family: var(--ff-display);
      font-size: 20px;
      text-align: center;
      color: var(--text);
      line-height: 1.3;
    }
    .timer-ex-params {
      font-family: var(--ff-data);
      font-size: 13px;
      color: var(--accent);
    }

    .timer-ring-wrap { position: relative; width: 200px; height: 200px; }
    .timer-ring-svg { width: 200px; height: 200px; }
    .timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .timer-ring-arc {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 100px 100px;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-display {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .timer-time {
      font-family: var(--ff-data);
      font-size: 52px;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }
    .timer-phase {
      font-size: 11px;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .timer-set-info {
      font-size: 14px;
      color: var(--sub);
    }
    .timer-set-info strong { color: var(--accent); font-family: var(--ff-data); }

    .timer-controls { display: flex; gap: 16px; align-items: center; }
    .btn-timer {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      transition: all 0.15s;
    }
    .btn-timer-primary {
      background: var(--accent);
      color: var(--bg);
      width: 72px; height: 72px;
      font-size: 26px;
    }
    .btn-timer-primary:active { background: var(--accent-d); transform: scale(0.95); }
    .btn-timer-sec {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--sub);
    }
    .btn-timer-sec:active { color: var(--text); border-color: var(--muted); }

    .timer-tip {
      font-size: 13px;
      color: var(--sub);
      text-align: center;
      line-height: 1.5;
      padding: 12px 16px;
      background: rgba(200,168,75,.06);
      border: 1px solid rgba(200,168,75,.15);
      border-radius: var(--r);
      max-width: 320px;
    }

    /* rest phase indicator */
    .timer-ring-arc.rest-phase { stroke: var(--muted); }

    /* ─── DONE SCREEN ────────────────────────────────────── */
    .done-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      text-align: center;
      gap: 16px;
    }
    .done-kanji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .done-title {
      font-family: var(--ff-display);
      font-size: 26px;
      color: var(--text);
    }
    .done-sub { font-size: 15px; color: var(--sub); line-height: 1.5; }
    .done-stats {
      display: flex;
      gap: 20px;
      margin: 12px 0;
    }
    .done-stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
    }
    .done-stat-val {
      font-family: var(--ff-display);
      font-size: 28px;
      color: var(--accent);
    }
    .done-stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .btn-done-home {
      width: 100%;
      padding: 15px;
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      font-size: 15px;
      margin-top: 8px;
    }
    .btn-done-home:active { background: #1e1e24; }

    /* ─── SCROLLBAR ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── UTILS ──────────────────────────────────────────── */
    .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── HOME SCREEN ──────────────────────────────────── -->
  <div class="screen active" id="screen-home">
    <header class="app-header">
      <div class="header-back"></div>
      <div class="header-title">
        Каратэ: подготовка
        <div class="header-subtitle">8 недель · ОФП</div>
      </div>
    </header>

    <div class="home-hero">
      <div class="hero-eyebrow" id="hero-eyebrow">Программа подготовки</div>
      <h1 class="hero-title">Общая<br><em>физическая</em><br>подготовка</h1>
      <p class="hero-meta" id="hero-meta">Выбери неделю и день для тренировки</p>
    </div>

    <!-- week progress ring -->
    <div class="week-ring-wrap" id="week-ring-wrap">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="35"/>
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="35" stroke-dasharray="219.9" stroke-dashoffset="219.9"/>
        <text class="ring-center" id="ring-pct" x="40" y="37">0%</text>
        <text class="ring-center-sub" x="40" y="52">прогресс</text>
      </svg>
      <div class="ring-info">
        <div class="ring-theme" id="ring-theme">–</div>
        <div class="ring-week" id="ring-week">Неделя –</div>
        <div class="ring-days-done" id="ring-days-done">– тренировок выполнено</div>
      </div>
    </div>

    <!-- week chips -->
    <div class="weeks-nav" id="weeks-nav"></div>

    <!-- days grid -->
    <div class="section-label" id="days-label">Дни недели</div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <!-- ── WORKOUT SCREEN ───────────────────────────────── -->
  <div class="screen" id="screen-workout">
    <header class="app-header">
      <button class="header-back" id="btn-back" data-visible>‹</button>
      <div class="header-title">
        <span id="workout-title">Тренировка</span>
        <div class="header-subtitle" id="workout-subtitle"></div>
      </div>
      <div class="workout-header-meta">
        <span class="type-badge" id="workout-type-badge"></span>
      </div>
    </header>
    <div class="workout-progress"><div class="workout-progress-fill" id="workout-progress-fill"></div></div>
    <div class="exercise-list" id="exercise-list"></div>
    <div class="workout-footer">
      <button class="btn-complete" id="btn-complete" disabled>Завершить тренировку</button>
    </div>
  </div>

  <!-- ── DONE SCREEN ──────────────────────────────────── -->
  <div class="screen" id="screen-done">
    <div class="done-screen">
      <div class="done-kanji" id="done-emoji">🥋</div>
      <h2 class="done-title" id="done-title">Тренировка завершена</h2>
      <p class="done-sub" id="done-sub"></p>
      <div class="done-stats" id="done-stats"></div>
      <button class="btn-done-home" id="btn-done-home">← Назад к программе</button>
    </div>
  </div>

</div>

<!-- ── TIMER OVERLAY ─────────────────────────────── -->
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-ex-name" id="timer-ex-name"></div>
  <div class="timer-ex-params" id="timer-ex-params"></div>

  <div class="timer-ring-wrap">
    <svg class="timer-ring-svg" viewBox="0 0 200 200">
      <circle class="timer-ring-bg" cx="100" cy="100" r="90"/>
      <circle class="timer-ring-arc" id="timer-ring-arc" cx="100" cy="100" r="90"
        stroke-dasharray="565.5" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display">
      <div class="timer-time" id="timer-time">0:00</div>
      <div class="timer-phase" id="timer-phase">подготовься</div>
    </div>
  </div>

  <div class="timer-set-info" id="timer-set-info"></div>

  <div class="timer-controls">
    <button class="btn-timer btn-timer-sec" id="btn-timer-skip" title="Пропустить">⏭</button>
    <button class="btn-timer btn-timer-primary" id="btn-timer-play">▶</button>
    <button class="btn-timer btn-timer-sec" id="btn-timer-close" title="Закрыть">✕</button>
  </div>

  <div class="timer-tip" id="timer-tip"></div>
</div>

<script>
// 8-week program: Strength, Flexibility, Endurance
// Designed for a sedentary 23yo preparing for karate

const PROGRAM = {
  weeks: [
    // WEEKS 1-2: Foundation
    {
      week: 1,
      theme: "Фундамент",
      days: [
        {
          day: 1, type: "strength", label: "Сила",
          exercises: [
            { id: "s1", name: "Отжимания (с колен)", sets: 3, reps: 8, rest: 60, tip: "Держи тело прямым от колен до головы. Грудь касается пола." },
            { id: "s2", name: "Приседания", sets: 3, reps: 10, rest: 60, tip: "Колени над носками, спина прямая, вес на пятках." },

// ─── STATE ─────────────────────────────────────────────────
const state = {
  currentWeek: 0,          // 0-indexed
  completedDays: {},        // key: "w-d" => true
  currentWorkout: null,     // { week, day, exercises: [] }
  completedExercises: new Set(),
  sessionStart: null,
};

// load from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('kpp_state') || '{}');
  if (saved.completedDays) state.completedDays = saved.completedDays;
  if (saved.currentWeek !== undefined) state.currentWeek = saved.currentWeek;
} catch(e) {}

function save() {
  localStorage.setItem('kpp_state', JSON.stringify({
    completedDays: state.completedDays,
    currentWeek: state.currentWeek,
  }));
}

// ─── UTILS ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function exParams(ex) {
  if (ex.isMax) return 'До отказа';
  if (ex.duration && ex.sets > 1) return `${ex.sets} × ${ex.duration} сек`;
  if (ex.duration) return `${ex.duration} сек`;
  if (ex.reps) return `${ex.sets > 1 ? ex.sets + ' × ' : ''}${ex.reps} повт.${ex.note ? ' ' + ex.note : ''}`;
  return '';
}

function typeClass(type) {
  return { strength: 'strength', flexibility: 'flexibility', endurance: 'endurance' }[type] || '';
}

function typeLabel(type) {
  return { strength: 'Сила', flexibility: 'Растяжка', endurance: 'Выносливость', rest: 'Отдых' }[type] || type;
}

function dayKey(w, d) { return `${w}-${d}`; }

function totalWorkoutDays() {
  return PROGRAM.weeks.reduce((acc, w) => acc + w.days.filter(d => d.type !== 'rest').length, 0);
}
function completedWorkoutCount() {
  return Object.keys(state.completedDays).length;
}

// ─── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0,0);
}

// ─── HOME SCREEN ───────────────────────────────────────────
function renderHome() {
  const week = PROGRAM.weeks[state.currentWeek];
  const totalDone = completedWorkoutCount();
  const total = totalWorkoutDays();
  const pct = Math.round(totalDone / total * 100);
  const circum = 2 * Math.PI * 35;

  // hero
  $('hero-eyebrow').textContent = `Неделя ${state.currentWeek + 1} из ${PROGRAM.weeks.length}`;
  $('hero-meta').textContent = `${totalDone} из ${total} тренировок выполнено`;

  // ring
  $('ring-pct').textContent = pct + '%';
  $('ring-fill').style.strokeDashoffset = circum * (1 - pct / 100);
  $('ring-theme').textContent = week.theme;
  $('ring-week').textContent = `Неделя ${week.week}`;
  const weekDone = week.days.filter(d => state.completedDays[dayKey(state.currentWeek, d.day - 1)] && d.type !== 'rest').length;
  const weekTotal = week.days.filter(d => d.type !== 'rest').length;
  $('ring-days-done').textContent = `${weekDone} из ${weekTotal} этой недели`;

  // week chips
  const nav = $('weeks-nav');
  nav.innerHTML = '';
  PROGRAM.weeks.forEach((w, i) => {
    const chip = document.createElement('button');
    chip.className = 'week-chip' + (i === state.currentWeek ? ' active' : '');
    chip.textContent = `Нед ${w.week}: ${w.theme}`;
    chip.addEventListener('click', () => {
      state.currentWeek = i;
      save();
      renderHome();
    });
    nav.appendChild(chip);
  });

  // days grid
  const grid = $('days-grid');
  grid.innerHTML = '';
  week.days.forEach((d, i) => {
    const pill = document.createElement('div');
    pill.className = 'day-pill';
    pill.dataset.type = d.type;
    const isDone = !!state.completedDays[dayKey(state.currentWeek, i)];
    if (isDone) pill.classList.add('done');

    // find "current" = first not-done non-rest
    pill.innerHTML = `
      <span class="day-pill-label">${d.type === 'rest' ? '–' : d.label.slice(0,3)}</span>
      <span class="day-pill-num">${d.day}</span>
    `;

    if (d.type !== 'rest') {
      pill.addEventListener('click', () => openWorkout(state.currentWeek, i));
    }
    grid.appendChild(pill);
  });

  // mark current day
  const firstNotDone = week.days.findIndex((d, i) => d.type !== 'rest' && !state.completedDays[dayKey(state.currentWeek, i)]);
  if (firstNotDone !== -1) grid.children[firstNotDone].classList.add('current');
}

// ─── WORKOUT SCREEN ────────────────────────────────────────
function openWorkout(weekIdx, dayIdx) {
  const week = PROGRAM.weeks[weekIdx];
  const day = week.days[dayIdx];
  if (day.type === 'rest') return;

  state.currentWorkout = { weekIdx, dayIdx, day };
  state.completedExercises = new Set();
  state.sessionStart = Date.now();

  $('workout-title').textContent = `День ${day.day}: ${typeLabel(day.type)}`;
  $('workout-subtitle').textContent = `Неделя ${week.week} · ${week.theme}`;
  const badge = $('workout-type-badge');
  badge.textContent = typeLabel(day.type);
  badge.className = 'type-badge ' + typeClass(day.type);

  renderExercises(day);
  showScreen('screen-workout');
}

function renderExercises(day) {
  const list = $('exercise-list');
  list.innerHTML = '';

  if (!day.exercises || day.exercises.length === 0) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sub)">День отдыха. Восстанавливайся.</div>';
    return;
  }

  day.exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.id = `ex-${i}`;

    const timerBtn = (ex.duration && !ex.isMax) ? `<button class="btn-timer-inline" data-idx="${i}" style="margin-top:8px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(200,168,75,.12);color:var(--accent);border:1px solid rgba(200,168,75,.25);">▶ Таймер</button>` : '';

    card.innerHTML = `
      <div class="ex-check"><span class="ex-check-mark">✓</span></div>
      <div class="ex-content">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-params">${exParams(ex)}</div>
        ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        ${timerBtn}
        ${ex.tip ? `<div class="ex-tip">${ex.tip}</div>` : ''}
      </div>
    `;

    // toggle complete
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-timer-inline')) return;
      card.classList.toggle('completed');
      card.classList.toggle('expanded');
      if (card.classList.contains('completed')) {
        state.completedExercises.add(i);
      } else {
        state.completedExercises.delete(i);
        card.classList.add('expanded');
      }
      updateWorkoutProgress(day);
    });

    // timer button
    const timerBtnEl = card.querySelector('.btn-timer-inline');
    if (timerBtnEl) {
      timerBtnEl.addEventListener('click', (e) => {
        e.stopPropagation();
        openTimer(ex, i);
      });
    }

    list.appendChild(card);
  });

  updateWorkoutProgress(day);
}

function updateWorkoutProgress(day) {
  const total = day.exercises.length;
  const done = state.completedExercises.size;
  const pct = total > 0 ? done / total * 100 : 0;
  $('workout-progress-fill').style.width = pct + '%';
  $('btn-complete').disabled = done < total;
}

$('btn-back').addEventListener('click', () => {
  showScreen('screen-home');
  renderHome();
});

$('btn-complete').addEventListener('click', () => {
  if (!state.currentWorkout) return;
  const { weekIdx, dayIdx } = state.currentWorkout;
  state.completedDays[dayKey(weekIdx, dayIdx)] = true;
  save();

  // auto-advance week if all days done
  const week = PROGRAM.weeks[weekIdx];
  const allDone = week.days.every((d, i) => d.type === 'rest' || state.completedDays[dayKey(weekIdx, i)]);
  if (allDone && weekIdx < PROGRAM.weeks.length - 1) {
    state.currentWeek = weekIdx + 1;
    save();
  }

  showDone();
});

// ─── DONE SCREEN ───────────────────────────────────────────
function showDone() {
  const { day } = state.currentWorkout;
  const elapsed = Math.round((Date.now() - state.sessionStart) / 1000);
  const exCount = day.exercises.length;
  const emojis = { strength: '💪', flexibility: '🤸', endurance: '🏃', rest: '😴' };

  $('done-emoji').textContent = emojis[day.type] || '🥋';
  $('done-title').textContent = 'Тренировка завершена';

  const tips = {
    strength: 'Сила строится повторением. Записывай ощущения — через месяц будет не узнать.',
    flexibility: 'Растяжка — это терпение. Каждый миллиметр заработан.',
    endurance: 'Сердце стало чуть сильнее. Так и работает прогресс.',
  };
  $('done-sub').textContent = tips[day.type] || '';

  $('done-stats').innerHTML = `
    <div class="done-stat">
      <div class="done-stat-val">${exCount}</div>
      <div class="done-stat-lbl">упражнений</div>
    </div>
    <div class="done-stat">
      <div class="done-stat-val">${formatTime(elapsed)}</div>
      <div class="done-stat-lbl">времени</div>
    </div>
    <div class="done-stat">
      <div class="done-stat-val">${completedWorkoutCount()}</div>
      <div class="done-stat-lbl">всего сессий</div>
    </div>
  `;

  showScreen('screen-done');
}

$('btn-done-home').addEventListener('click', () => {
  showScreen('screen-home');
  renderHome();
});

// ─── TIMER ─────────────────────────────────────────────────
let timerState = {
  active: false,
  paused: false,
  currentSet: 0,
  totalSets: 0,
  timeLeft: 0,
  totalTime: 0,
  isRest: false,
  restTime: 0,
  ex: null,
  interval: null,
  exIdx: null,
};

const CIRCUM = 2 * Math.PI * 90; // 565.5

function openTimer(ex, exIdx) {
  clearInterval(timerState.interval);
  timerState = {
    active: false,
    paused: true,
    currentSet: 1,
    totalSets: ex.sets,
    timeLeft: ex.duration,
    totalTime: ex.duration,
    isRest: false,
    restTime: ex.rest || 30,
    ex,
    interval: null,
    exIdx,
  };

  updateTimerUI();
  $('timer-overlay').classList.add('open');
}

function updateTimerUI() {
  const { ex, currentSet, totalSets, timeLeft, totalTime, isRest } = timerState;

  $('timer-ex-name').textContent = ex.name;
  $('timer-ex-params').textContent = exParams(ex);
  $('timer-time').textContent = formatTime(timeLeft);
  $('timer-phase').textContent = isRest ? 'отдых' : 'работа';
  $('timer-set-info').innerHTML = `Подход <strong>${currentSet}</strong> из <strong>${totalSets}</strong>`;
  $('timer-tip').textContent = ex.tip || '';

  const arc = $('timer-ring-arc');
  arc.className = 'timer-ring-arc' + (isRest ? ' rest-phase' : '');
  const used = 1 - timeLeft / totalTime;
  arc.style.strokeDashoffset = CIRCUM * used;

  $('btn-timer-play').textContent = timerState.paused ? '▶' : '⏸';
}

$('btn-timer-play').addEventListener('click', () => {
  if (timerState.paused) {
    timerState.paused = false;
    timerState.active = true;
    $('btn-timer-play').textContent = '⏸';
    timerState.interval = setInterval(timerTick, 1000);
  } else {
    timerState.paused = true;
    clearInterval(timerState.interval);
    $('btn-timer-play').textContent = '▶';
  }
});

function timerTick() {
  timerState.timeLeft--;

  if (timerState.timeLeft <= 0) {
    // phase ended
    if (!timerState.isRest) {
      // work done → start rest or next set
      if (timerState.currentSet < timerState.totalSets) {
        timerState.isRest = true;
        timerState.timeLeft = timerState.restTime;
        timerState.totalTime = timerState.restTime;
      } else {
        // all sets done
        clearInterval(timerState.interval);
        timerState.active = false;
        timerState.paused = true;
        timerState.timeLeft = 0;
        updateTimerUI();
        // mark exercise done after short delay
        setTimeout(() => {
          closeTimer();
          // mark the exercise card as complete
          const card = document.getElementById(`ex-${timerState.exIdx}`);
          if (card && !card.classList.contains('completed')) card.click();
        }, 600);
        return;
      }
    } else {
      // rest done → next set
      timerState.isRest = false;
      timerState.currentSet++;
      timerState.timeLeft = timerState.ex.duration;
      timerState.totalTime = timerState.ex.duration;
    }
  }

  updateTimerUI();
}

$('btn-timer-skip').addEventListener('click', () => {
  clearInterval(timerState.interval);
  timerState.paused = true;
  timerState.timeLeft = 0;
  timerTick(); // advance phase
  if (timerState.paused) return;
  timerState.interval = setInterval(timerTick, 1000);
});

$('btn-timer-close').addEventListener('click', closeTimer);

function closeTimer() {
  clearInterval(timerState.interval);
  timerState.active = false;
  $('timer-overlay').classList.remove('open');
}

// ─── INIT ──────────────────────────────────────────────────
renderHome();

// register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
